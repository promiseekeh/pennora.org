<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  * { box-sizing: border-box; margin: 0; }
  html, body { margin: 0; background: #0f1512; }
  .card {
    width: 1200px;
    height: 630px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(900px 500px at 50% -10%, rgba(75,191,143,0.20), transparent 60%),
      radial-gradient(700px 420px at 88% 115%, rgba(75,191,143,0.14), transparent 55%),
      #0f1512;
    color: #eef4f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px;
  }
  .mark { display: flex; align-items: center; gap: 22px; margin-bottom: 40px; }
  .mark svg { width: 92px; height: 92px; filter: drop-shadow(0 10px 30px rgba(75,191,143,0.3)); }
  .word { font-size: 76px; font-weight: 700; letter-spacing: -0.02em; }
  h1 { font-size: 52px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.1; max-width: 20ch; }
  h1 .accent { color: #79d6ae; }
  p { margin-top: 26px; font-size: 26px; color: #93a49c; }
  .badge {
    margin-top: 40px;
    font-size: 18px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;
    color: #79d6ae; border: 1px solid rgba(75,191,143,0.35); background: rgba(75,191,143,0.10);
    padding: 10px 22px; border-radius: 999px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="mark">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="16" fill="#131b17"/>
        <rect x="16" y="19" width="32" height="8" rx="4" fill="#eef4f0"/>
        <rect x="16" y="31" width="24" height="8" rx="4" fill="#eef4f0"/>
        <rect x="16" y="43" width="17" height="8" rx="4" fill="#4bbf8f"/>
      </svg>
      <span class="word">pennora</span>
    </div>
    <h1>A simple, private home for your <span class="accent">money</span>.</h1>
    <p>Income &middot; Spending &middot; Savings &middot; Investments</p>
    <div class="badge">Coming Soon</div>
  </div>
</body>
</html>
